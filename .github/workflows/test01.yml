name: Test 01
on:
  push:
    paths:
      - 'sheet01/**'
jobs:
  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: sheet01
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '9.0.0'
      - run: gradle test --info
